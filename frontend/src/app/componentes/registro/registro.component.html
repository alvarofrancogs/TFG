<div class="min-h-screen bg-white flex w-full overflow-hidden">
  
  <div class="w-full lg:w-[45%] xl:w-[40%] min-h-screen flex flex-col justify-between p-8 lg:p-12 xl:p-16 relative z-10 bg-white">
    
    <div>
      <a routerLink="/" class="inline-flex items-center gap-2 text-[11px] font-medium tracking-[0.15em] uppercase text-gray-400 hover:text-emerald-950 transition-colors mb-10">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        Inicio
      </a>
      <a routerLink="/" class="text-2xl tracking-tighter text-emerald-950 block">
        OASIS<span class="font-bold">CLUB</span>
      </a>
    </div>

    <div class="w-full max-w-sm mx-auto my-auto py-12">
      <p class="text-[10px] font-bold tracking-[0.3em] uppercase text-gray-400 mb-6">ÚNETE A NOSOTROS</p>
      <h1 class="leading-[1.1] font-normal text-gray-900 mb-12" style="font-family: 'Playfair Display', serif; font-size: clamp(2.5rem, 4vw, 3rem);">
        Crea tu<br>
        <span class="italic text-[#0B2118]">cuenta.</span>
      </h1>

      <form class="space-y-6" (ngSubmit)="submitRegister()">
        
        <div class="relative">
          <input [(ngModel)]="name" name="name" type="text" id="name" class="block w-full border-0 border-b border-gray-200 py-3 text-emerald-950 placeholder-transparent focus:border-emerald-950 focus:ring-0 peer bg-transparent transition-colors text-sm font-light" placeholder="Nombre completo" required>
          <label for="name" class="absolute left-0 -top-3.5 text-[10px] font-semibold tracking-[0.1em] text-gray-400 uppercase transition-all peer-placeholder-shown:text-sm peer-placeholder-shown:text-gray-400 peer-placeholder-shown:top-3 peer-placeholder-shown:font-light peer-placeholder-shown:tracking-normal peer-focus:-top-3.5 peer-focus:text-[10px] peer-focus:font-semibold peer-focus:tracking-[0.1em] peer-focus:text-emerald-950">
            Nombre completo
          </label>
        </div>

        <div class="relative">
          <input [(ngModel)]="email" name="email" type="email" id="email" class="block w-full border-0 border-b border-gray-200 py-3 text-emerald-950 placeholder-transparent focus:border-emerald-950 focus:ring-0 peer bg-transparent transition-colors text-sm font-light" placeholder="Correo electrónico" required>
          <label for="email" class="absolute left-0 -top-3.5 text-[10px] font-semibold tracking-[0.1em] text-gray-400 uppercase transition-all peer-placeholder-shown:text-sm peer-placeholder-shown:text-gray-400 peer-placeholder-shown:top-3 peer-placeholder-shown:font-light peer-placeholder-shown:tracking-normal peer-focus:-top-3.5 peer-focus:text-[10px] peer-focus:font-semibold peer-focus:tracking-[0.1em] peer-focus:text-emerald-950">
            Correo electrónico
          </label>
        </div>

        <div class="relative">
          <input [(ngModel)]="phone" name="phone" type="tel" id="phone" class="block w-full border-0 border-b border-gray-200 py-3 text-emerald-950 placeholder-transparent focus:border-emerald-950 focus:ring-0 peer bg-transparent transition-colors text-sm font-light" placeholder="Teléfono" required>
          <label for="phone" class="absolute left-0 -top-3.5 text-[10px] font-semibold tracking-[0.1em] text-gray-400 uppercase transition-all peer-placeholder-shown:text-sm peer-placeholder-shown:text-gray-400 peer-placeholder-shown:top-3 peer-placeholder-shown:font-light peer-placeholder-shown:tracking-normal peer-focus:-top-3.5 peer-focus:text-[10px] peer-focus:font-semibold peer-focus:tracking-[0.1em] peer-focus:text-emerald-950">
            Teléfono
          </label>
        </div>

        <div class="relative pt-2">
          <input [(ngModel)]="birthDate" name="birthDate" type="date" id="birthDate" class="block w-full border-0 border-b border-gray-200 py-3 text-emerald-950 focus:border-emerald-950 focus:ring-0 bg-transparent transition-colors text-sm font-light" required>
          <label for="birthDate" class="absolute left-0 -top-3.5 text-[10px] font-semibold tracking-[0.1em] text-gray-400 uppercase">
            Fecha de nacimiento
          </label>
        </div>

        <div class="relative">
          <input [(ngModel)]="password" name="password" type="password" id="password" class="block w-full border-0 border-b border-gray-200 py-3 text-emerald-950 placeholder-transparent focus:border-emerald-950 focus:ring-0 peer bg-transparent transition-colors text-sm font-light" placeholder="Contraseña" required>
          <label for="password" class="absolute left-0 -top-3.5 text-[10px] font-semibold tracking-[0.1em] text-gray-400 uppercase transition-all peer-placeholder-shown:text-sm peer-placeholder-shown:text-gray-400 peer-placeholder-shown:top-3 peer-placeholder-shown:font-light peer-placeholder-shown:tracking-normal peer-focus:-top-3.5 peer-focus:text-[10px] peer-focus:font-semibold peer-focus:tracking-[0.1em] peer-focus:text-emerald-950">
            Contraseña (mín. 6 caracteres)
          </label>
        </div>

        @if (errorMessage()) {
          <div class="flex items-center gap-2 text-[13px] text-red-500 pt-2 bg-red-50/50 p-3 border-l-2 border-red-500">
            <span class="font-light">{{ errorMessage() }}</span>
          </div>
        }

        <button [disabled]="loading()" type="submit" class="w-full bg-[#0B2118] text-white py-4 text-[11px] font-medium tracking-[0.15em] uppercase hover:bg-emerald-900 transition-colors mt-8 disabled:opacity-60 disabled:cursor-not-allowed">
          @if (loading()) {
            Creando cuenta...
          } @else {
            Crear cuenta
          }
        </button>
      </form>
    </div>

    <div class="text-[13px] font-light text-gray-500">
      ¿Ya tienes cuenta? 
      <a routerLink="/login" class="font-medium text-[#0B2118] hover:underline decoration-[#0B2118]/30 underline-offset-4 transition-all ml-1">
        Inicia sesión
      </a>
    </div>

  </div>

  <div class="hidden lg:block lg:w-[55%] xl:w-[60%] h-screen relative bg-[#FAFAFA]">
    <div class="absolute inset-0 z-0">
      <img src="images/auth-hero-ultrareal.png" alt="Recepción premium de Oasis Club" class="w-full h-full object-cover object-center grayscale-[20%]" 
        referrerpolicy="no-referrer">
    </div>
  </div>

</div>
