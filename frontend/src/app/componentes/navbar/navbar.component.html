<nav class="fixed w-full z-50 bg-white border-b border-gray-100" [class.hidden]="isAdmin">
  <div class="max-w-screen-2xl mx-auto px-6 lg:px-12">
    <div class="flex justify-between items-center h-20 md:h-24">
      <a routerLink="/" class="text-xl md:text-2xl tracking-tighter text-emerald-950">
        OASIS<span class="font-bold">CLUB</span>
      </a>

      <div class="hidden md:flex space-x-12">
        <a routerLink="/" routerLinkActive="text-emerald-950 font-medium"
          [routerLinkActiveOptions]="{exact: true}"
          class="text-[13px] font-light text-gray-500 hover:text-emerald-950 transition-colors">
          Inicio
        </a>
        <a routerLink="/quienes-somos" routerLinkActive="text-emerald-950 font-medium"
          class="text-[13px] font-light text-gray-500 hover:text-emerald-950 transition-colors cursor-pointer">
          Quiénes Somos
        </a>
        <a routerLink="/eventos" routerLinkActive="text-emerald-950 font-medium"
          class="text-[13px] font-light text-gray-500 hover:text-emerald-950 transition-colors">
          Eventos
        </a>
        <a routerLink="/contacto" routerLinkActive="text-emerald-950 font-medium"
          class="text-[13px] font-light text-gray-500 hover:text-emerald-950 transition-colors">
          Contacto
        </a>
        @if (auth.isLoggedIn()) {
          <a routerLink="/reservar" routerLinkActive="text-emerald-950 font-medium"
            class="text-[13px] font-light text-gray-500 hover:text-emerald-950 transition-colors">
            Reservar
          </a>
          <a routerLink="/gimnasio" routerLinkActive="text-emerald-950 font-medium"
            class="text-[13px] font-light text-gray-500 hover:text-emerald-950 transition-colors">
            Gimnasio
          </a>
          <a routerLink="/perfil" routerLinkActive="text-emerald-950 font-medium"
            class="text-[13px] font-light text-gray-500 hover:text-emerald-950 transition-colors">
            Mi Área
          </a>
        }
      </div>

      <div class="flex items-center">
        @if (auth.isLoggedIn()) {
          <a routerLink="/perfil"
            class="hidden md:block text-[13px] font-light text-gray-500 hover:text-emerald-950 transition-colors mr-6">
            Perfil
          </a>
          <div class="hidden md:block h-6 w-px bg-gray-200 mr-6"></div>
          <button (click)="logout()"
            class="hidden md:block bg-[#0B2118] text-white text-[13px] font-medium px-6 py-2.5 hover:bg-emerald-900 transition-colors">
            Salir
          </button>
        } @else {
          <a routerLink="/login"
            class="hidden md:block text-[13px] font-light text-gray-500 hover:text-emerald-950 transition-colors mr-6">
            Acceder
          </a>
          <div class="hidden md:block h-6 w-px bg-gray-200 mr-6"></div>
          <a routerLink="/registro"
            class="hidden md:block bg-[#0B2118] text-white text-[13px] font-medium px-6 py-2.5 hover:bg-emerald-900 transition-colors">
            Hazte socio
          </a>
        }

        <button (click)="isMobileMenuOpen.set(!isMobileMenuOpen())"
          class="md:hidden p-2 ml-4 text-emerald-950 focus:outline-none"
          aria-controls="mobile-menu"
          [attr.aria-expanded]="isMobileMenuOpen()"
          aria-label="Alternar menú">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            @if (isMobileMenuOpen()) {
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6 18L18 6M6 6l12 12"></path>
            } @else {
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 6h16M4 12h16M4 18h16"></path>
            }
          </svg>
        </button>
      </div>
    </div>
  </div>

  <div id="mobile-menu"
    class="md:hidden bg-white border-t border-gray-100 px-6 py-8 flex flex-col space-y-6 shadow-xl absolute w-full left-0 top-full"
    [class.hidden]="!isMobileMenuOpen()">
    <a routerLink="/" (click)="isMobileMenuOpen.set(false)"
      class="text-sm font-light text-gray-500 hover:text-emerald-950">Inicio</a>
    <a routerLink="/quienes-somos" (click)="isMobileMenuOpen.set(false)"
      class="text-sm font-light text-gray-500 hover:text-emerald-950">Quiénes Somos</a>
    <a routerLink="/eventos" (click)="isMobileMenuOpen.set(false)"
      class="text-sm font-light text-gray-500 hover:text-emerald-950">Eventos</a>
    <a routerLink="/contacto" (click)="isMobileMenuOpen.set(false)"
      class="text-sm font-light text-gray-500 hover:text-emerald-950">Contacto</a>
    @if (auth.isLoggedIn()) {
      <a routerLink="/reservar" (click)="isMobileMenuOpen.set(false)"
        class="text-sm font-light text-gray-500 hover:text-emerald-950">Reservar</a>
      <a routerLink="/gimnasio" (click)="isMobileMenuOpen.set(false)"
        class="text-sm font-light text-gray-500 hover:text-emerald-950">Gimnasio</a>
      <a routerLink="/perfil" (click)="isMobileMenuOpen.set(false)"
        class="text-sm font-light text-gray-500 hover:text-emerald-950">Mi Área</a>
      <hr class="border-gray-100">
      <a routerLink="/perfil" (click)="isMobileMenuOpen.set(false)"
        class="text-sm font-medium text-emerald-950">Perfil</a>
      <button (click)="logout()"
        class="text-left text-sm font-light text-gray-500 hover:text-emerald-950">Salir</button>
    } @else {
      <hr class="border-gray-100">
      <a routerLink="/login" (click)="isMobileMenuOpen.set(false)"
        class="text-sm font-medium text-emerald-950">Acceder</a>
      <a routerLink="/registro" (click)="isMobileMenuOpen.set(false)"
        class="text-sm font-medium text-[#0B2118]">Hazte socio</a>
    }
  </div>
</nav>
