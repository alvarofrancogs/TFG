<div class="dd-wrapper">
  
  <button
    type="button"
    class="dd-trigger"
    [class.dd-trigger--open]="isOpen()"
    [class.dd-trigger--placeholder]="!value"
    (click)="toggle()"
    [attr.aria-expanded]="isOpen()"
    aria-haspopup="listbox">
    <span class="dd-trigger__label">
      {{ value ? selectedLabel : placeholder }}
    </span>
    <svg class="dd-trigger__chevron" [class.dd-trigger__chevron--open]="isOpen()"
      fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 9l-7 7-7-7"/>
    </svg>
  </button>

  
  @if (isOpen()) {
    <div class="dd-panel" role="listbox">
      @for (option of options; track option.value) {
        <button
          type="button"
          class="dd-option"
          [class.dd-option--selected]="option.value === value"
          (click)="select(option)"
          role="option"
          [attr.aria-selected]="option.value === value">
          {{ option.label }}
          @if (option.value === value) {
            <svg class="dd-option__check" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
            </svg>
          }
        </button>
      }
    </div>
  }
</div>
