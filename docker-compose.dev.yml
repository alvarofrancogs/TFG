services:
  postgres:
    image: postgres:16
    container_name: oasisclub-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-oasisclub}
      POSTGRES_USER: ${POSTGRES_USER:-oasisclub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oasisclub}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-oasisclub} -d ${POSTGRES_DB:-oasisclub}"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: oasisclub-backend-dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-oasisclub}
      DB_USERNAME: ${POSTGRES_USER:-oasisclub}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-oasisclub}
      PORT: 8080
      JWT_SECRET: ${JWT_SECRET:-dev_secret_key_change_in_production_123456}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://tfg-mocha.vercel.app,http://localhost:4200,http://127.0.0.1:4200,http://localhost:4300,http://127.0.0.1:4300}
      CORS_ORIGIN_PATTERNS: ${CORS_ORIGIN_PATTERNS:-http://localhost:*,http://127.0.0.1:*,https://*.onrender.com,https://*.vercel.app}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:4300}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_OVERRIDE_TO: ${MAIL_OVERRIDE_TO:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      SPRING_DEVTOOLS_RESTART_ENABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      - ./backend/src:/app/src
      - ./backend/pom.xml:/app/pom.xml

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: oasisclub-frontend-dev
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "4300:4300"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/proxy.conf.dev.json:/app/proxy.conf.dev.json

volumes:
  postgres_data_dev:
