spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    show-sql: true

logging:
  level:
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG

app:
  cors:
    allowed-origins: ${CORS_ORIGINS:https://tfg-mocha.vercel.app,http://localhost:4200,http://127.0.0.1:4200,http://localhost:4300,http://127.0.0.1:4300}
  frontend-url: ${FRONTEND_URL:http://localhost:4200}

